name: CI - Pruebas y Métricas

# Se dispara en cada push y en cada pull request
on:
  push:
  pull_request:
  workflow_dispatch:   # permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-test-metricas:
    runs-on: ubuntu-latest
    steps:
      # 1) Clona el repositorio en la máquina limpia
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2) Instala .NET 8
      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3) Restaura dependencias y compila
      - name: Restaurar
        run: dotnet restore EasierNotes.sln
      - name: Compilar
        run: dotnet build EasierNotes.sln --configuration Release --no-restore

      # 4) Ejecuta las 97 pruebas y recolecta cobertura
      - name: Ejecutar pruebas con cobertura
        run: >
          dotnet test EasierNotes.sln --no-build --configuration Release
          --logger "trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./resultados

      # 5) Publica el resumen de pruebas (agrega los .trx -> total real)
      - name: Publicar resultados de pruebas
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          trx_files: "resultados/**/*.trx"

      # 6) Instala Python + Pandas para el pipeline de métricas
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias del pipeline
        run: pip install pandas openpyxl

      # 7) Ejecuta el pipeline: genera Excel de auditoría + datos.json
      #    (las métricas de desempeño quedan como 'pendiente' porque
      #     JMeter no corre en CI; se integran con el script local)
      - name: Generar métricas (proceso)
        run: python pipeline_metricas.py --dir ./resultados --out ./salida

      # 8) Sube todo como artefacto descargable
      - name: Publicar artefacto de métricas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metricas-y-resultados
          path: |
            resultados/**/*.trx
            resultados/**/coverage.cobertura.xml
            salida/Auditoria_Metricas_EasierNotes.xlsx
            salida/datos.json
